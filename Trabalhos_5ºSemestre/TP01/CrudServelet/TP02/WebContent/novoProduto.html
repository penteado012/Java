<!DOCTYPE html> 
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">Novo Produto</h2>
        <form action="NovoProdutoServlet" method="POST">
            <div class="mb-3">
                <label class="form-label">Nome do Produto</label>
                <input type="text" class="form-control" name="nome" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Descrição</label>
                <textarea class="form-control" name="descricao" rows="2" required></textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Unidade de Compra</label>
                    <input type="number" class="form-control" name="unidadeCompra" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Qtd. Prevista Mês</label>
                    <input type="number" step="0.01" class="form-control" name="qtdPrevistoMes" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Preço Máximo</label>
                <div class="input-group">
                    <span class="input-group-text">R$</span>
                    <input type="number" step="0.01" class="form-control" name="precoMaxComprado" required>
                </div>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">Salvar Produto</button>
                <a href="ListaProdutos" class="btn btn-outline-secondary">Ver Lista</a>
            </div>
        </form>
    </div>
</body>
</html>
